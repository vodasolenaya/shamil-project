<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявки — Искусство продаж</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e0c;
      --bg2: #1a1814;
      --card: #201e1a;
      --border: rgba(255,255,255,.07);
      --gold: #C9A84C;
      --gold2: #b8944a;
      --text: #f0ede8;
      --text2: #999;
      --text3: #666;
      --green: #22c55e;
      --red: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Login screen */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%;
    }
    .login-logo {
      font-size: 1.6rem; font-weight: 900; letter-spacing: -.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-sub { color: var(--text2); font-size: .9rem; margin-bottom: 28px; }
    .login-label { font-size: .8rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: block; }
    .login-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-size: .95rem; outline: none; margin-bottom: 16px;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000; font-weight: 800; font-size: .95rem;
      padding: 13px; border-radius: 10px; border: none; cursor: pointer;
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .9; }
    .login-error { color: var(--red); font-size: .82rem; margin-top: 10px; display: none; }

    /* Main layout */
    #app { display: none; }
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo {
      font-weight: 900; font-size: .95rem; letter-spacing: -.3px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .total-badge {
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.2);
      color: var(--gold); font-size: .8rem; font-weight: 700;
      padding: 4px 12px; border-radius: 100px;
    }
    .logout-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-size: .8rem; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; transition: border-color .2s;
    }
    .logout-btn:hover { border-color: var(--text2); color: var(--text); }

    .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 22px;
    }
    .stat-num {
      font-size: 1.8rem; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1; margin-bottom: 6px;
    }
    .stat-label { font-size: .78rem; color: var(--text2); }

    /* Table */
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
    }
    .table-title { font-size: 1rem; font-weight: 700; }
    .search-input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; color: var(--text);
      font-size: .85rem; outline: none; width: 240px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--gold); }

    .subs-list { display: flex; flex-direction: column; gap: 12px; }

    .sub-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color .2s;
      cursor: pointer;
    }
    .sub-card:hover { border-color: rgba(201,168,76,.3); }
    .sub-card.expanded { border-color: rgba(201,168,76,.4); }

    .sub-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px;
    }
    .sub-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 900; color: #000;
    }
    .sub-info { flex: 1; min-width: 0; }
    .sub-name { font-size: .92rem; font-weight: 700; margin-bottom: 2px; }
    .sub-tg { font-size: .78rem; color: var(--gold); }
    .sub-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    .sub-badge {
      font-size: .7rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 6px;
    }
    .sub-badge.diag { background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid rgba(201,168,76,.2); }
    .sub-badge.landing { background: rgba(99,102,241,.12); color: #818cf8; border: 1px solid rgba(99,102,241,.2); }
    .sub-badge.paid { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .sub-badge.free { background: rgba(255,255,255,.05); color: var(--text2); border: 1px solid var(--border); }
    .sub-time { font-size: .75rem; color: var(--text3); white-space: nowrap; }
    .sub-chevron {
      color: var(--text3); font-size: .85rem; transition: transform .2s;
      flex-shrink: 0;
    }
    .sub-card.expanded .sub-chevron { transform: rotate(180deg); }

    .sub-body { display: none; border-top: 1px solid var(--border); padding: 20px; }
    .sub-card.expanded .sub-body { display: block; }

    .sub-details-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 20px;
    }
    .sub-detail {
      background: var(--bg2); border-radius: 8px; padding: 12px 14px;
    }
    .sub-detail-label { font-size: .72rem; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .sub-detail-value { font-size: .88rem; font-weight: 600; }

    .answers-section { }
    .answers-title {
      font-size: .75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 14px;
    }
    .answer-item {
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .answer-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .answer-q {
      font-size: .8rem; font-weight: 700; color: var(--text2); margin-bottom: 6px;
    }
    .answer-a {
      font-size: .88rem; color: var(--text); line-height: 1.6;
      background: var(--bg2); border-radius: 8px; padding: 10px 14px;
    }

    /* Pagination */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px;
    }
    .page-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text2); font-size: .82rem; padding: 7px 14px;
      border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }
    .page-info { font-size: .82rem; color: var(--text2); }

    /* Empty / loading */
    .empty-state {
      text-align: center; padding: 60px 24px;
      color: var(--text2); font-size: .92rem;
    }
    .loading { text-align: center; padding: 40px; color: var(--text2); }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media(max-width: 680px) {
      .main { padding: 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .sub-details-row { grid-template-columns: 1fr; }
      .sub-meta { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Искусство продаж</div>
    <p class="login-sub">Панель управления заявками</p>
    <label class="login-label">Пароль</label>
    <input type="password" id="secret-input" class="login-input" placeholder="Введи пароль" />
    <button class="login-btn" onclick="login()">Войти →</button>
    <p class="login-error" id="login-error">Неверный пароль</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">artofsales · заявки</span>
    <div class="topbar-right">
      <span class="total-badge" id="total-badge">Загрузка…</span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-num" id="st-total">—</div><div class="stat-label">Всего заявок</div></div>
      <div class="stat-card"><div class="stat-num" id="st-diag">—</div><div class="stat-label">Диагностик</div></div>
      <div class="stat-card"><div class="stat-num" id="st-paid">—</div><div class="stat-label">Платных (990₽)</div></div>
      <div class="stat-card"><div class="stat-num" id="st-today">—</div><div class="stat-label">Сегодня</div></div>
    </div>

    <div class="table-header">
      <div class="table-title">Заявки</div>
      <input type="text" class="search-input" id="search" placeholder="🔍 Поиск по имени или telegram…" oninput="filterSubs()" />
    </div>

    <div id="subs-container">
      <div class="loading"><div class="spinner"></div>Загружаю заявки…</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
  let SECRET = '';
  let allSubs = [];
  let filtered = [];
  let currentPage = 0;
  const PAGE_SIZE = 20;

  function login() {
    SECRET = document.getElementById('secret-input').value.trim();
    if (!SECRET) return;
    loadSubs(true);
  }

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    SECRET = '';
    allSubs = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('secret-input').value = '';
  }

  async function loadSubs(isFirstLoad = false) {
    try {
      const r = await fetch(`/api/submissions?secret=${encodeURIComponent(SECRET)}&action=list&limit=1000`);
      if (r.status === 401) {
        if (isFirstLoad) {
          document.getElementById('login-error').style.display = 'block';
        }
        return;
      }
      const data = await r.json();
      allSubs = data.items || [];

      if (isFirstLoad) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        // Сохраняем секрет на сессию
        sessionStorage.setItem('admin_secret', SECRET);
      }

      updateStats();
      filtered = [...allSubs];
      currentPage = 0;
      renderPage();
    } catch (e) {
      console.error(e);
    }
  }

  function updateStats() {
    const total = allSubs.length;
    const diag  = allSubs.filter(s => s.answers && s.answers.length > 0).length;
    const paid  = allSubs.filter(s => s.format === 'paid').length;
    const today = allSubs.filter(s => {
      const d = new Date(s.created_at);
      const now = new Date();
      return d.toDateString() === now.toDateString();
    }).length;

    document.getElementById('st-total').textContent = total;
    document.getElementById('st-diag').textContent  = diag;
    document.getElementById('st-paid').textContent  = paid;
    document.getElementById('st-today').textContent = today;
    document.getElementById('total-badge').textContent = `${total} заявок`;
  }

  function filterSubs() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    if (!q) {
      filtered = [...allSubs];
    } else {
      filtered = allSubs.filter(s =>
        (s.name || '').toLowerCase().includes(q) ||
        (s.telegram || '').toLowerCase().includes(q) ||
        (s.income || '').toLowerCase().includes(q) ||
        (s.sphere || '').toLowerCase().includes(q)
      );
    }
    currentPage = 0;
    renderPage();
  }

  function renderPage() {
    const start = currentPage * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);
    const container = document.getElementById('subs-container');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">Заявок не найдено</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    container.innerHTML = '<div class="subs-list">' +
      page.map(renderSubCard).join('') +
    '</div>';

    // Pagination
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    pag.innerHTML = `
      <button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>← Назад</button>
      <span class="page-info">Страница ${currentPage + 1} из ${totalPages}</span>
      <button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Вперёд →</button>
    `;
  }

  function goPage(p) {
    currentPage = p;
    renderPage();
    window.scrollTo(0, 0);
  }

  function renderSubCard(s) {
    const initials = (s.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const isDiag   = s.answers && s.answers.length > 0;
    const isPaid   = s.format === 'paid';
    const date     = new Date(s.created_at);
    const dateStr  = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    const timeStr  = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    const badgeType = isDiag ? 'diag' : 'landing';
    const badgeLabel = isDiag ? 'Диагностика' : 'Лендинг';

    const answers = isDiag ? `
      <div class="answers-section">
        <div class="answers-title">📝 Ответы на диагностику (${s.answers.length})</div>
        ${s.answers.map(a => `
          <div class="answer-item">
            <div class="answer-q">${a.n}. ${escHtml(a.question)}</div>
            <div class="answer-a">${escHtml(a.answer || '—')}</div>
          </div>
        `).join('')}
      </div>
    ` : '';

    const details = `
      <div class="sub-details-row">
        <div class="sub-detail"><div class="sub-detail-label">Telegram</div><div class="sub-detail-value">${escHtml(s.telegram || '—')}</div></div>
        <div class="sub-detail"><div class="sub-detail-label">Доход</div><div class="sub-detail-value">${escHtml(s.income || '—')}</div></div>
        <div class="sub-detail"><div class="sub-detail-label">Формат</div><div class="sub-detail-value">${s.format === 'paid' ? '💳 990 ₽' : s.format === 'free' ? '🆓 Бесплатно' : '—'}</div></div>
        ${s.utm_source ? `<div class="sub-detail"><div class="sub-detail-label">UTM Source</div><div class="sub-detail-value">${escHtml(s.utm_source)}</div></div>` : ''}
        ${s.utm_campaign ? `<div class="sub-detail"><div class="sub-detail-label">UTM Campaign</div><div class="sub-detail-value">${escHtml(s.utm_campaign)}</div></div>` : ''}
        <div class="sub-detail"><div class="sub-detail-label">ID</div><div class="sub-detail-value" style="font-size:.72rem;color:var(--text3)">${s.id}</div></div>
      </div>
      ${answers}
    `;

    return `
      <div class="sub-card" id="card-${s.id}" onclick="toggleCard('${s.id}')">
        <div class="sub-header">
          <div class="sub-avatar">${initials}</div>
          <div class="sub-info">
            <div class="sub-name">${escHtml(s.name || 'Без имени')}</div>
            <div class="sub-tg">${escHtml(s.telegram || '')}</div>
          </div>
          <div class="sub-meta">
            <span class="sub-badge ${badgeType}">${badgeLabel}</span>
            ${isPaid ? '<span class="sub-badge paid">990 ₽</span>' : ''}
            <span class="sub-time">${dateStr} · ${timeStr}</span>
          </div>
          <span class="sub-chevron">▾</span>
        </div>
        <div class="sub-body">${details}</div>
      </div>
    `;
  }

  function toggleCard(id) {
    const card = document.getElementById('card-' + id);
    card.classList.toggle('expanded');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Авто-вход из сессии
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('admin_secret');
    if (saved) {
      SECRET = saved;
      loadSubs(true);
    }
  });

  // Обновление каждые 60 секунд
  setInterval(() => {
    if (SECRET) loadSubs(false);
  }, 60000);
</script>
</body>
</html>
